name: Frontend - Lint & Format Check

on:
  pull_request:
    paths:
      - frontend/**
      - .github/workflows/frontend-lint.yml
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/frontend-lint.yml

jobs:
  lint-and-format-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (check only)
        run: npm run lint

      - name: Run Prettier (check only)
        run: npm run format:check

      - name: Run Build (type check & build)
        run: npm run build
        env:
          DEFAULT_USER_ID: ci-build-placeholder

      - name: Summary
        if: success()
        run: |
          echo "## ✅ All Checks Passed" >> $GITHUB_STEP_SUMMARY
          echo "- ESLint: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Prettier: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- Build: Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Ready to merge!" >> $GITHUB_STEP_SUMMARY
