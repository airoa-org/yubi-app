services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    ports:
      - "${HOST_BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8000/health-check",
        ]
      interval: 10s
      timeout: 3s
      start_period: 120s
      retries: 5
    volumes:
      - ./backend:/app
      - ./openapi:/openapi
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${HOST_FRONTEND_PORT:-3000}:3000"
    env_file:
      - ./frontend/.env
    environment:
      BACKEND_API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - ./openapi:/openapi
      - /app/node_modules
    restart: unless-stopped

  postgres:
    image: postgres:17.5
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_DB: ${DB_NAME:-airoa}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${HOST_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  localstack:
    image: localstack/localstack:3.8
    ports:
      - "${HOST_LOCALSTACK_PORT:-4566}:4566"
    environment:
      SERVICES: s3
    volumes:
      - localstackdata:/var/lib/localstack

volumes:
  pgdata:
  redisdata:
  localstackdata:
